name: Deploy Dashboard to GitHub Pages

# Pages-Source ist "GitHub Actions" (über actions/configure-pages),
# kein Branch. Pages wird beim ersten Run automatisch aktiviert.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Initialer Scrape (best-effort, damit Build aktuelle Werte zeigt)
        run: npm run scrape
        continue-on-error: true

      - name: Vite Build
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Pages konfigurieren (aktiviert Pages, falls noch nicht aktiv)
        uses: actions/configure-pages@v5

      - name: Build-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
