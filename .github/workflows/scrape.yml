name: Scrape Market Data

# Schreibt public/market_data.json auf main. Der Push triggert
# automatisch den Deploy-Workflow, der das Bundle inkl. neuer
# Daten via GitHub Pages publisht.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

# Sequenziell, damit zwei Cron-Läufe sich nicht in den Push verbeißen.
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Scraper
        run: node scripts/scrape.mjs

      - name: Push market_data.json auf main
        run: |
          set -e
          git config user.name  "fx-pro-scraper[bot]"
          git config user.email "fx-pro-scraper[bot]@users.noreply.github.com"

          if git diff --quiet public/market_data.json; then
            echo "Keine Änderung."
            exit 0
          fi

          git add public/market_data.json
          git commit -m "data: update market_data.json"
          git push origin main
